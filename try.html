<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenEase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 50%, #00d4aa 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    padding-top: 60px;
}

/* NAVBAR */
.top-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 55px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 25px;
    background: rgba(0,0,0,0.18);
    backdrop-filter: blur(12px);
    z-index: 2000;
    color: white;
}

.top-right a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
}

.top-right a:hover {
    color: #38ef7d;
}

/* LOGIN CARD */
.login-card {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 40px 35px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 40px rgba(17,153,142,0.3);
}

/* LOGO */
.logo {
    text-align: center;
    margin-bottom: 30px;
}

.logo h1 {
    font-size: 2.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #11998e, #38ef7d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* INPUT GROUP */
.input-group {
    position: relative;
    margin-bottom: 25px;
}

.input-group input {
    width: 100%;
    padding: 18px 20px;
    border: 2px solid #e1e5e9;
    border-radius: 12px;
    font-size: 16px;
    outline: none;
}

/* FIXED LABEL LOGIC */
.input-group label {
    position: absolute;
    left: 20px;
    top: 18px;
    color: #888;
    font-size: 15px;
    transition: 0.3s ease;
    pointer-events: none;
}

/* 🔥 FIX HERE */
.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label,
.input-group input:valid + label {
    top: -8px;
    left: 15px;
    font-size: 12px;
    color: #38ef7d;
    background: white;
    padding: 0 8px;
    border-radius: 6px;
}

/* BUTTON */
.login-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #11998e, #38ef7d);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
}

/* MESSAGE */
.message {
    display: none;
    margin-top: 15px;
    padding: 12px;
    text-align: center;
    border-radius: 10px;
}

.message.error { background: #fee; color: #c53030; }
.message.success { background: #f0fff4; color: #38a169; }

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="top-bar">
    <div>🟢 Connected</div>
    <div>Online</div>
    <div class="top-right">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- LOGIN -->
<div class="login-card">

    <div class="logo">
        <h1>GenEase</h1>
    </div>

    <form>
        <div class="input-group">
            <input type="text" id="username" placeholder="" required>
            <label>Username</label>
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="" required>
            <label>Password</label>
        </div>

        <button class="login-btn">Sign In</button>
    </form>

    <div class="message" id="msg"></div>

</div>

</body>
</html>
